<!DOCTYPE html>
<html>
<head>
  <title>Book Tickets</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container mt-4">
  <center><h2><b>Book Your Tickets</b></h2></center>
  <hr>

  <form class="needs-validation" novalidate>

    <!-- FLOATING LABEL -->
     <h3><b>Name:</b></h3>
    <div class="form-floating mb-3">
      <input type="text" class="form-control" required>
      <label>Name</label>
    </div>

    <!-- INPUT GROUP -->
     <h3><b>Mobile Number:</b></h3>
    <div class="input-group mb-3">
      
      <input type="number" class="form-control" placeholder="Mobile Number">
    </div>

    <!-- RADIO -->
     <h3><b>Seat type:</b></h3>
    <div class="form-check">
      <input class="form-check-input" type="radio" name="type">
      <label class="form-check-label">Normal</label>
    </div>
    <div class="form-check">
      <input class="form-check-input" type="radio" name="type">
      <label class="form-check-label">Premium</label>
    </div>
   <br>
    <select class="form-select bg-dark text-light border-warning">
  <option selected disabled>Select Movie</option>
  <option>Interstellar</option>
  <option>Inception</option>
  <option>The Dark Knight</option>
</select>
  

 
<br>
    <!-- INPUT GROUP -->
     <h3><b>Number of tickets:</b></h3>
    <div class="input-group mb-1">
      
      <input type="number" class="form-control" placeholder="Number of Tickets">
    </div>





    <br>
    <hr>

<center>
    <button class="btn btn-warning mt-3">Confirm Booking</button>
    <input type="reset" class="btn btn-secondary mt-3 ms-2" value="Reset"> </center>
  </form>
</div>
<hr>
<center>
<a href="index.html" class="btn btn-warning">
  ← Back to Home
</a> </center>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<footer class="text-center mt-5 p-3 bg-dark text-light">
  © 2026 ParadoX Cinemas | Experience Beyond Screens
</footer>
   





<script>
document.addEventListener("DOMContentLoaded", function () {
    const form = document.querySelector("form");
    const submitBtn = document.querySelector(".btn-warning");

    /* Disable button initially */
    submitBtn.disabled = true;
    submitBtn.style.opacity = "0.6";
    submitBtn.style.cursor = "not-allowed";

    function checkFormValidity() {
        let name = document.querySelector(".form-floating input");
        let mobile = document.querySelector('input[placeholder="Mobile Number"]');
        let seatType = document.querySelector('input[name="type"]:checked');
        let movie = document.querySelector(".form-select");
        let tickets = document.querySelector('input[placeholder="Number of Tickets"]');

        let mobilePattern = /^[0-9]{10}$/;
        let valid = true;

        /* Name */
        if (name.value.trim() === "") {
            name.setCustomValidity("Please enter your full name");
            valid = false;
        } else {
            name.setCustomValidity("");
        }

        /* Mobile */
        if (!mobile.value.match(mobilePattern)) {
            mobile.setCustomValidity("Please enter a valid 10-digit mobile number");
            valid = false;
        } else {
            mobile.setCustomValidity("");
        }

        /* Seat Type */
        if (!seatType) {
            valid = false;
        }

        /* Movie */
        if (movie.value === "Select Movie") {
            movie.setCustomValidity("Please select a movie");
            valid = false;
        } else {
            movie.setCustomValidity("");
        }

        /* Tickets */
        if (tickets.value.trim() === "" || tickets.value <= 0) {
            tickets.setCustomValidity("Please enter valid number of tickets");
            valid = false;
        } else {
            tickets.setCustomValidity("");
        }

        /* Enable / Disable Button */
        if (valid) {
            submitBtn.disabled = false;
            submitBtn.style.opacity = "1";
            submitBtn.style.cursor = "pointer";
        } else {
            submitBtn.disabled = true;
            submitBtn.style.opacity = "0.6";
            submitBtn.style.cursor = "not-allowed";
        }
    }

    /* Live Validation */
    form.addEventListener("input", checkFormValidity);
    form.addEventListener("change", checkFormValidity);

    /* Submit Validation */
    form.addEventListener("submit", function (e) {
        checkFormValidity();

        if (!form.checkValidity()) {
            e.preventDefault();
            form.reportValidity(); /* shows exact field message */
        } else {
            alert("Booking Confirmed Successfully!");
        }
    });
});
</script>




</body>
</html>
