<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ParadoX Cinemas Premium Subscription</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #000;
    color: #ffd700;
    min-height: 100vh;
}

/* Form Container */
.form-container {
    background: #111;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 0 25px rgba(255, 215, 0, 0.3);
}

/* Title */
.cinema-title {
    font-size: 2.5rem;
    font-weight: bold;
    text-align: center;
    color: #ffd700;
    margin-bottom: 5px;
}

.subtitle {
    text-align: center;
    color: #bbb;
    margin-bottom: 30px;
}

/* Inputs */
.form-control,
.form-select,
textarea {
    background-color: #000;
    color: #ffd700;
    border: 1px solid #ffd700;
}

.form-control::placeholder {
    color: #aaa;
}

.form-control:focus,
.form-select:focus {
    background-color: #000;
    color: #ffd700;
    border-color: #ffd700;
    box-shadow: 0 0 8px #ffd700;
}

/* Labels */
.form-label {
    color: #ffd700;
}

/* Buttons */
.btn-premium {
    background-color: #ffd700;
    color: #000;
    font-weight: bold;
}

.btn-premium:hover {
    background-color: #ffcc00;
    color: #000;
}

.btn-outline-light {
    border-color: #ffd700;
    color: #ffd700;
}

.btn-outline-light:hover {
    background-color: #ffd700;
    color: #000;
}

/* Checkboxes & Radio */
.form-check-input {
    background-color: #000;
    border-color: #ffd700;
}

.form-check-input:checked {
    background-color: #ffd700;
    border-color: #ffd700;



    
}
</style>
</head>

<body>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">

      <div class="form-container">

        <!-- Theatre Name -->
        <div class="cinema-title"> ParadoX Cinemas</div>
        <div class="subtitle">Premium Membership Subscription</div>

        <form>

          <!-- Personal Info -->
          <h5 class="mb-3">Personal Information</h5>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">First Name</label>
              <input type="text" class="form-control" placeholder="Enter first name" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Last Name</label>
              <input type="text" class="form-control" placeholder="Enter last name" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" placeholder="example@email.com" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="tel" class="form-control" placeholder="+91 XXXXX XXXXX" required>
          </div>

          <!-- Plan -->
          <h5 class="mt-4 mb-3">Membership Plan</h5>

          <div class="mb-3">
            <select class="form-select" required>
              <option selected disabled>Select a plan</option>
              <option>Silver — ₹999/month</option>
              <option>Gold — ₹1,999/month</option>
              <option>Platinum — ₹3,499/month</option>
            </select>
          </div>

          <!-- Seat -->
          <div class="mb-3">
            <label class="form-label">Preferred Seat Type</label><br>

            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="seat" required>
              <label class="form-check-label">Standard</label>
            </div>

            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="seat">
              <label class="form-check-label">Recliner</label>
            </div>

            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="seat">
              <label class="form-check-label">VIP Lounge</label>
            </div>
          </div>

          <!-- Add-ons -->
          <div class="mb-3">
            <label class="form-label">Add-ons</label>

            <div class="form-check">
              <input class="form-check-input" type="checkbox">
              <label class="form-check-label">Unlimited Popcorn & Drinks</label>
            </div>

            <div class="form-check">
              <input class="form-check-input" type="checkbox">
              <label class="form-check-label">Priority Booking</label>
            </div>

            <div class="form-check">
              <input class="form-check-input" type="checkbox">
              <label class="form-check-label">Guest Pass (2/month)</label>
            </div>
          </div>

          <!-- Payment -->
          <h5 class="mt-4 mb-3">Payment Details</h5>

          <div class="mb-3">
            <input type="text" class="form-control" placeholder="Card Holder Name">
          </div>

          <div class="mb-3">
            <input type="text" class="form-control" placeholder="Card Number">
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <input type="month" class="form-control">
            </div>
            <div class="col-md-6">
              <input type="password" class="form-control" placeholder="CVV">
            </div>
          </div>

<!-- Identity Proof Upload -->
<div class="mb-3">
  <h5 class="mt-4 mb-3">Identity Proof</h5>
  <input type="file" class="form-control" accept=".jpg,.jpeg,.png,.pdf" required>
  <div class="form-text text-warning">
    Accepted formats: JPG, PNG, PDF (Max 5MB)
  </div>
</div>




          <!-- Terms -->
          <div class="form-check mb-4">
            <input class="form-check-input" type="checkbox" required>
            <label class="form-check-label">
              I agree to Terms & Conditions
            </label>
          </div>

          <!-- Buttons -->
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-premium btn-lg">
              Subscribe Now
            </button>
            <button type="reset" class="btn btn-outline-light">
              Reset
            </button>
          </div>

        </form>

      </div>
    </div>
  </div>
</div>

<center>
<a href="index.html" class="btn btn-warning">
  ← Back to Home
</a> </center>
<br>
<br>
<hr>

<footer class="text-center mt-5 p-3 bg-dark text-light">
  © 2026 ParadoX Cinemas | Experience Beyond Screens
</footer>

</body>
</html>
